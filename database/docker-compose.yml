version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: assetflow_db
    environment:
      POSTGRES_USER: assetflow_user
      POSTGRES_PASSWORD: assetflow_password
      POSTGRES_DB: assetflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
